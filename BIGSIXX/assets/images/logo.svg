<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 138" fill="none">
  <!-- Hexagon logo matching the BIGSIXX brand -->
  <!-- Top face (white) -->
  <polygon points="60,4 110,32 110,32 60,32 10,32" fill="#FFFFFF"/>
  <!-- Top face proper hexagon top -->
  <polygon points="10,32 60,4 110,32" fill="#FFFFFF" opacity="0.95"/>
  <!-- Left face (dark blue) -->
  <polygon points="10,32 60,32 60,102 10,74" fill="#003A7D"/>
  <!-- Right face (cyan/teal) -->
  <polygon points="110,32 110,74 60,102 60,32" fill="#4BBFD4"/>
  <!-- Highlight lines -->
  <polygon points="10,32 60,4 110,32 60,32" fill="#E8F4F8" opacity="0.3"/>
</svg>
